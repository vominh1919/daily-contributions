name: Weekly Stats Report

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9:00 UTC
  workflow_dispatch:

jobs:
  weekly-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Generate weekly report
        run: |
          WEEK=$(date -u +"%Y-W%V")
          mkdir -p reports
          
          echo "# Weekly Report - $WEEK" > reports/week-$WEEK.md
          echo "" >> reports/week-$WEEK.md
          echo "## Commits This Week" >> reports/week-$WEEK.md
          git log --since="7 days ago" --oneline | wc -l | xargs echo "Total commits:" >> reports/week-$WEEK.md
          echo "" >> reports/week-$WEEK.md
          echo "## Active Days" >> reports/week-$WEEK.md
          git log --since="7 days ago" --format="%ad" --date=short | sort -u | wc -l | xargs echo "Days with commits:" >> reports/week-$WEEK.md
          
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "docs: weekly report [skip ci]"
          git push
